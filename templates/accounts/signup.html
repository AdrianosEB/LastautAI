{% extends "base.html" %}
{% block title %}Sign Up — LastautAI{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-box">
        <h1>Sign Up</h1>

        {% if messages %}
            {% for message in messages %}
                <p class="error-msg">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <p><label>Email<br><input type="email" name="email" required autofocus></label></p>
            <p><label>Password<br><input type="password" name="password1" required></label></p>
            <p><label>Confirm Password<br><input type="password" name="password2" required></label></p>
            <button type="submit">Create Account</button>
        </form>

        <p class="alt-link">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
    </div>
</div>
{% endblock %}
